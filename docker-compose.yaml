version: '3.4'
services:
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Edmonton
    volumes:
      - ./config/prowlarr:/config
    ports:
      - 9696:9696
    networks:
      - mediaserver
    restart: unless-stopped

  # Jackett is still used ass some indexers have issues on Prowlarr
  jackett:
    image: ghcr.io/linuxserver/jackett:latest
    container_name: jackett
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ./config/jackett:/config
    ports:
      - 9117:9117
    networks:
      - mediaserver
    restart: unless-stopped


  transmission:
    image: haugene/transmission-openvpn
    container_name: transmission
    volumes:
      - /mnt/storage/Downloads/:/mnt/storage/Downloads/
      - ./config/transmission:/config
      - ./protonvpn:/etc/openvpn/custom/
    environment:
      - PUID=1000
      - PGID=1000
      - TRANSMISSION_DOWNLOAD_DIR=/mnt/storage/Downloads/
      - TRANSMISSION_IDLE_SEEDING_LIMIT_ENABLED=false
      - TRANSMISSION_SEED_QUEUE_ENABLED=false
      - TRANSMISSION_INCOMPLETE_DIR_ENABLED=false
      - TRANSMISSION_RATIO_LIMIT=0
      - TRANSMISSION_RATIO_LIMIT_ENABLED=true
      - TRANSMISSION_UTP_ENABLED=false
      - TRANSMISSION_SCRIPT_TORRENT_DONE_ENABLED=true
      - TRANSMISSION_SCRIPT_TORRENT_DONE_FILENAME="/config/transmission-home/transmission-cross-seed.sh"
      - TRANSMISSION_BLOCKLIST_ENABLED=true
      - TRANSMISSION_BLOCKLIST_URL=https://github.com/Naunter/BT_BlockLists/raw/master/bt_blocklists.gz
      - WEBPROXY_ENABLED=false
      - LOCAL_NETWORK=10.0.0.0/16
    cap_add:
      - NET_ADMIN
    logging:
      driver: json-file
      options:
        max-size: 10m
    ports:
      - 9091:9091
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
    env_file:
      - proton.env
    networks:
      - mediaserver

        #  audiobookshelf:
        #    image: ghcr.io/advplyr/audiobookshelf:latest
        #    ports:
        #      - 13378:80
        #    volumes:
        #      - ./config/audiobookshelf:/config
        #      - ./config/audiobookshelf/metadata:/metadata
        #      - /mnt/storage/_Dump/Audiobooks:/audiobooks
        #

# External App
  nginx:
    build: ../Nginx
    container_name: nginx
    ports:
      - 5055:5055
    restart: always
    volumes:
      - ./config/nginx/conf/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./logs/nginx/logs/:/logs/
      - ./logs/nginx/var:/var/log/nginx
    security_opt:
      - seccomp:unconfined
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
    networks:
      - mediaserver

  overseerr:
    image: lscr.io/linuxserver/overseerr:latest
    container_name: overseerr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Edmonton
    volumes:
      - ./config/overseerr/:/config
    ports:
      - 5000:5055
    networks:
      - mediaserver
    restart: unless-stopped

#Automation Services
  sonarr:
    image: linuxserver/sonarr
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ./config/sonarr:/config
      - /mnt/storage/Media/:/mnt/storage/Media/
      - /mnt/storage/Downloads/:/mnt/storage/Downloads/
    ports:
      - 8989:8989
    depends_on:
      - prowlarr
      - transmission
    networks:
      - mediaserver
    restart: unless-stopped

  radarr:
    image: linuxserver/radarr
    container_name: radarr
    hostname: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ./config/radarr:/config
      - /mnt/storage/Media/:/mnt/storage/Media/
      - /mnt/storage/Downloads/:/mnt/storage/Downloads/
    ports:
      - 7878:7878
    networks:
      - mediaserver
    depends_on:
      - prowlarr
      - transmission
    restart: unless-stopped

